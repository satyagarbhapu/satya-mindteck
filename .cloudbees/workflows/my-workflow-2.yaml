apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: launchable-python-workflow

on:
  push:
    branches:
      - '**'

jobs:
  ci-job:
    steps:

      # Fix git permission
      - uses: docker://alpine/git:latest
        run: |
          git config --global --add safe.directory /cloudbees/workspace

      # Checkout code
      - name: Checkout
        uses: https://github.com/cloudbees-io/checkout@v1

      # Install Python + dependencies
      - name: Install Dependencies
        uses: docker://python:3.10
        run: |
          pip install --upgrade pip
          pip install pytest launchable

      # Record build in Launchable
      - name: Record Build
        uses: docker://python:3.10
        run: |
          launchable record build --name $CLOUDBEES_BUILD_ID
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}

      # Select important tests
      - name: Select Tests
        uses: docker://python:3.10
        run: |
          launchable subset \
            --target 50% \
            --output tests_to_run.txt \
            tests/
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}

      # Run tests
      - name: Run Tests
        uses: docker://python:3.10
        run: |
          if [ -s tests_to_run.txt ]; then
            echo "Running selected tests"
            pytest $(cat tests_to_run.txt)
          else
            echo "Running all tests"
            pytest tests/
          fi

      # Send results back to Launchable
      - name: Record Results
        uses: docker://python:3.10
        run: |
          launchable record tests pytest tests/
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}